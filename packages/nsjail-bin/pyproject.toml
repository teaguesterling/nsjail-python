[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nsjail-bin"
version = "0.2.0"
description = "Pre-built nsjail binary for nsjail-python"
requires-python = ">=3.12"
license = "MIT"

[tool.hatch.build.targets.wheel]
packages = ["src/nsjail_bin"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
