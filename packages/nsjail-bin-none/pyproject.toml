[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nsjail-bin-none"
version = "0.1.0"
description = "No-op nsjail binary package (use system nsjail)"
requires-python = ">=3.12"
license = "MIT"

[tool.hatch.build.targets.wheel]
packages = ["src/nsjail_bin_none"]
