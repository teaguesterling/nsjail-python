[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nsjail-bin-build"
version = "0.1.0"
description = "Build nsjail from source for nsjail-python"
requires-python = ">=3.12"
license = "MIT"

[tool.hatch.build.targets.wheel]
packages = ["src/nsjail_bin_build"]
