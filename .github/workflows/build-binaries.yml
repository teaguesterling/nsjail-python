name: Build nsjail binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build nsjail in manylinux container
        env:
          DOCKER_PLATFORM: ${{ matrix.docker_platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          docker run --rm \
            --platform "$DOCKER_PLATFORM" \
            -v "$GITHUB_WORKSPACE":/work \
            -w /work \
            "quay.io/pypa/manylinux_2_28_${ARCH}" \
            bash -c '
              set -ex

              # Install build dependencies (include static libs for portable binary)
              yum install -y \
                protobuf-compiler protobuf-devel protobuf-static \
                libnl3-devel libnl3-static \
                libcap-devel libcap-static \
                bison flex autoconf libtool git make gcc-c++ \
                pkg-config

              # Build nsjail with static linking for protobuf, libnl3, libcap
              # so the binary is portable across Linux distros (not tied to
              # the specific .so versions in this build container)
              cd _vendor/nsjail

              # Find static protobuf archive path
              PROTOBUF_STATIC=$(pkg-config --variable=libdir protobuf)/libprotobuf.a

              # Override PROTOBUF_LIBS to use static archive (+ zlib dep).
              # The Makefile handles libnl3/libcap via pkg-config normally —
              # those are stable enough across glibc-based distros. Protobuf
              # is the one that breaks (so.15 vs so.32 across distro versions).
              make -j$(nproc) \
                USER_DEFINES="-DMS_NOSYMFOLLOW=256 -DF_SEAL_FUTURE_WRITE=16 -Wno-error=array-bounds" \
                PROTOBUF_LIBS="$PROTOBUF_STATIC -lz"

              strip nsjail

              # Verify binary is not dynamically linked to protobuf
              file nsjail
              ! ldd nsjail | grep libprotobuf && echo "OK: no dynamic libprotobuf dependency"

              # Copy into package
              cp nsjail /work/packages/nsjail-bin/src/nsjail_bin/_bin/nsjail
              chmod +x /work/packages/nsjail-bin/src/nsjail_bin/_bin/nsjail
            '

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and retag wheel
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          pip install build hatchling wheel
          cd packages/nsjail-bin
          python -m build --wheel
          # Retag wheel: PyPI needs manylinux tag, not linux_*
          # Also fix to py3-none since binary isn't Python-version-specific
          cd dist
          for whl in *.whl; do
            python -m wheel tags --python-tag py3 --abi-tag none \
              --platform-tag "manylinux_2_28_${ARCH}" "$whl" --remove
          done

      - name: Verify wheel contents
        if: matrix.arch == 'x86_64'
        run: |
          pip install packages/nsjail-bin/dist/*.whl
          python -c "
          from nsjail_bin import binary_path
          p = binary_path()
          print(f'Binary at: {p}')
          print(f'Size: {p.stat().st_size} bytes')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: nsjail-bin-${{ matrix.arch }}
          path: packages/nsjail-bin/dist/*.whl

  publish-binary:
    needs: build-binary
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
