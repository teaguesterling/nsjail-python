name: Build nsjail binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build nsjail in manylinux container
        env:
          DOCKER_PLATFORM: ${{ matrix.docker_platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          docker run --rm \
            --platform "$DOCKER_PLATFORM" \
            -v "$GITHUB_WORKSPACE":/work \
            -w /work \
            "quay.io/pypa/manylinux_2_28_${ARCH}" \
            bash -c '
              set -ex

              # Install build dependencies
              yum install -y \
                protobuf-compiler protobuf-devel \
                libnl3-devel libcap-devel \
                bison flex autoconf libtool git make gcc-c++ \
                pkg-config curl

              # Build a static libprotobuf so the nsjail binary is portable
              # across distros (AlmaLinux 8 ships .so.15, modern distros
              # ship .so.32+). The -devel RPM only includes .so, not .a.
              PROTOBUF_VER=$(pkg-config --modversion protobuf)
              curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOBUF_VER}/protobuf-cpp-${PROTOBUF_VER}.tar.gz" -o /tmp/pb.tar.gz
              tar xzf /tmp/pb.tar.gz -C /tmp
              cd /tmp/protobuf-${PROTOBUF_VER}
              ./configure --disable-shared --enable-static --with-pic CXXFLAGS="-fPIE -O2"
              make -j$(nproc)
              make install

              # Build nsjail, linking the static protobuf
              cd /work/_vendor/nsjail
              make -j$(nproc) \
                USER_DEFINES="-DMS_NOSYMFOLLOW=256 -DF_SEAL_FUTURE_WRITE=16 -Wno-error=array-bounds" \
                PROTOBUF_CFLAGS="-I/usr/local/include" \
                PROTOBUF_LIBS="/usr/local/lib/libprotobuf.a -lz -lpthread"

              strip nsjail

              # Verify binary is not dynamically linked to protobuf
              file nsjail
              ! ldd nsjail | grep libprotobuf && echo "OK: no dynamic libprotobuf dependency"

              # Copy into package
              cp nsjail /work/packages/nsjail-bin/src/nsjail_bin/_bin/nsjail
              chmod +x /work/packages/nsjail-bin/src/nsjail_bin/_bin/nsjail
            '

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and retag wheel
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          pip install build hatchling wheel
          cd packages/nsjail-bin
          python -m build --wheel
          # Retag wheel: PyPI needs manylinux tag, not linux_*
          # Also fix to py3-none since binary isn't Python-version-specific
          cd dist
          for whl in *.whl; do
            python -m wheel tags --python-tag py3 --abi-tag none \
              --platform-tag "manylinux_2_28_${ARCH}" "$whl" --remove
          done

      - name: Verify wheel contents
        if: matrix.arch == 'x86_64'
        run: |
          pip install packages/nsjail-bin/dist/*.whl
          python -c "
          from nsjail_bin import binary_path
          p = binary_path()
          print(f'Binary at: {p}')
          print(f'Size: {p.stat().st_size} bytes')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: nsjail-bin-${{ matrix.arch }}
          path: packages/nsjail-bin/dist/*.whl

  publish-binary:
    needs: build-binary
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
